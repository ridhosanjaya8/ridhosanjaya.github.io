<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ridho Sanjaya Putra</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f3f5f8;
    color:#222;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:30px 15px;
}

/* HEADER */

.header-card{
    background:#fff;
    border-radius:14px;
    padding:25px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
    margin-bottom:20px;
}

.header-card h1{
    font-size:48px;
    margin-bottom:8px;
}

.header-card p{
    color:#999;
    font-size:18px;
}

/* TOP SECTION */

.top-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-bottom:20px;
}

.doc-card{
    background:white;
    border-radius:12px;
    padding:18px;
    min-height:130px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.doc-card h2{
    font-size:18px;
    font-weight:normal;
}

/* SECTION TAB */

.section-title{
    display:inline-block;
    background:white;
    padding:14px 20px;
    border-radius:12px 12px 0 0;
    font-size:18px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

/* LIST */

.list-card{
    background:white;
    border-radius:12px;
    padding:24px;
    margin-bottom:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.list-card span{
    font-size:18px;
    font-weight:500;
    margin-right:20px;
}

/* BUTTON */

.btn{
    background:#12b8f5;
    color:white;
    border:none;
    padding:12px 24px;
    border-radius:5px;
    cursor:pointer;
    text-decoration:none;
    font-size:16px;
    transition:.2s;
    white-space:nowrap;
}

.btn:hover{
    background:#009ad3;
}

.btn-red{
    background:#e74c3c;
}

.btn-red:hover{
    background:#cf3829;
}

/* MODAL */

.modal{
    display:none;
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.75);
    z-index:9999;
}

.modal-content{
    width:95%;
    max-width:1200px;
    height:92vh;
    background:white;
    margin:2vh auto;
    border-radius:12px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

.toolbar{
    padding:12px;
    background:#f2f2f2;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.toolbar a,
.toolbar button{
    border:none;
}

#pdfFrame{
    width:100%;
    flex:1;
    border:none;
}

/* MOBILE */

@media(max-width:768px){

    .header-card h1{
        font-size:32px;
    }

    .header-card p{
        font-size:15px;
    }

    .top-grid{
        grid-template-columns:1fr;
    }

    .list-card{
        flex-direction:column;
        align-items:flex-start;
        gap:15px;
    }

    .list-card span{
        margin-right:0;
        font-size:16px;
    }

    .btn{
        width:100%;
        text-align:center;
    }

    .toolbar{
        flex-direction:column;
    }

}

</style>
</head>

<body>

<div class="container">

    <!-- HEADER -->

    <div class="header-card">
        <h1>Ridho Sanjaya Putra</h1>
        <p>Personal Data & Document Portal</p>
    </div>

    <!-- CV & BIODATA -->

    <div class="top-grid">

        <div class="doc-card">
            <h2>Curriculum Vitae</h2>

            <button
            class="btn"
            onclick="openPDF('cv/CV RIDHO SANJAYA PUTRA 2026JD2.pdf')">
            Lihat / Unduh
            </button>
        </div>

        <div class="doc-card">
            <h2>Biodata</h2>

            <button
            class="btn"
            disabled
            style="opacity:.6;">
            Segera Hadir
            </button>
        </div>

    </div>

    <!-- SERTIFIKAT -->

    <div class="section-title">
        Sertifikat
    </div>

    <div style="height:8px;"></div>

    <div class="list-card">
        <span>BNSP KKNI LEVEL II : TEKNIK KOMPUTER DAN JARINGAN - 2018</span>

        <button
        class="btn"
        onclick="openPDF('sertifikat/BNSP.pdf')">
        Lihat / Unduh
        </button>
    </div>

    <div class="list-card">
        <span>SERTIFIKAT PKL PT TELKOM - 2018</span>

        <button
        class="btn"
        onclick="openPDF('sertifikat/S_PKL_Telkom_RidhoSanjayaPutra2018.pdf')">
        Lihat / Unduh
        </button>
    </div>

    <div class="list-card">
        <span>INSTRUKTUR PKW DESAIN GRAFIS - 2020</span>

        <button
        class="btn"
        onclick="openPDF('sertifikat/SPKW ARCIKO.pdf')">
        Lihat / Unduh
        </button>
    </div>

</div>

<!-- MODAL PDF -->

<div id="pdfModal" class="modal">

    <div class="modal-content">

        <div class="toolbar">

            <a
            id="downloadBtn"
            class="btn"
            download>
            Unduh PDF
            </a>

            <a
            id="newTabBtn"
            class="btn"
            target="_blank">
            Buka di Tab Baru
            </a>

            <button
            class="btn btn-red"
            onclick="closePDF()">
            Tutup
            </button>

        </div>

        <iframe id="pdfFrame"></iframe>

    </div>

</div>

<script>

function openPDF(file){

    document.getElementById("pdfModal").style.display = "block";

    document.getElementById("pdfFrame").src = file;

    document.getElementById("downloadBtn").href = file;

    document.getElementById("newTabBtn").href = file;
}

function closePDF(){

    document.getElementById("pdfModal").style.display = "none";

    document.getElementById("pdfFrame").src = "";
}

window.onclick = function(event){

    const modal = document.getElementById("pdfModal");

    if(event.target === modal){
        closePDF();
    }

}

document.addEventListener("keydown", function(e){

    if(e.key === "Escape"){
        closePDF();
    }

});

</script>

</body>
</html>
